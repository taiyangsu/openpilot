name: Sync Branches

on:
  schedule:
    # 每天10点UTC（你可以根据需要调整时区）
    - cron: '0 10 * * *'
  workflow_dispatch:  # 允许手动启动工作流

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the main repository
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.ACTIONS_PAT }}  # 显式传递GH_TOKEN

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "github-actions@github.com"
      # Existing remotes and branches
      - name: Add remote repositories 
        run: | 
         git remote add FrogPilot https://github.com/FrogAi/FrogPilot.git 
         git remote add openpilot https://github.com/ajouatom/openpilot.git 
         git remote add sunnypilot https://github.com/sunnypilot/sunnypilot.git
      - name: Fetch and merge frogpilot 
        run: | 
         git fetch frogpilot 
         git checkout -B frogpilot frogpilot/frogpilot
         git push origin frogpilot --force  
      - name: Fetch and merge sunnypilot 
        run: | 
         git fetch sunnypilot 
         git checkout -B dev-c3 sunnypilot/dev-c3 
         git push origin dev-c3 --force 
      - name: Fetch and merge openpilot  
        run: | 
         git fetch openpilot 
         git checkout -B carrot2-v6 openpilot/carrot2-v6 
         git push origin carrot2-v6 --force 

