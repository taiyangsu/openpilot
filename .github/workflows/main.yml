name: Sync Forks
on:
  schedule:
    - cron: '0 0 * * *'  # 每天同步一次
  workflow_dispatch:   
 
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout the mail repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GH_TOKEN }}
    - name: Setup Git
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email "github-actions@github.com"
    - name: Add remote for MoreTore/openpilot
      run: |
        git remote add moretore https://github.com/MoreTore/openpilot.git
        git fetch moretore mazda-frogpilot
        git fetch moretore mazda-frogpilot-0.9.6 # 同步 mazda-frogpilot-0.9.6 分支
    - name: Add remote for FrogAi/FrogPilot
        git remote add frogai https://github.com/FrogAi/FrogPilot.git
        git fetch frogai
    - name: Delete conflicting branch mazda-frogpilot if it exists
        git branch -r | grep "origin/mazda-frogpilot" && git push origin --delete mazda-frogpilot || echo "No conflict with mazda-frogpilot"
        - name: Create and push mazda-frogpilot branch
        run:|        
        
        git remote add sunnypilot https://github.com/sunnypilot/sunnypilot.git
        git remote add FrogPilot https://github.com/FrogAi/FrogPilot.git
        git remote add dragonpilot https://github.com/dragonpilot-community/dragonpilot
        git remote add openpilot https://github.com/commaai/openpilot
    - name: Fetch and merge sunnypilot
      run: |
        git fetch sunnypilot
        git checkout -B dev-c3 sunnypilot/dev-c3
        git push origin dev-c3 --force
    - name: Fetch and merge sunnypilot
      run: |
        git fetch sunnypilot
        git checkout -B toyota sunnypilot/toyota
        git push origin toyota --force

    - name: Fetch and merge openpilot  
      run: |
        git fetch openpilot
        git checkout -B carrot2-v6 openpilot/carrot2-v6
        git push origin carrot2-v6 --force
        

        

        

       

        

